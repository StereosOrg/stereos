<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 430">
  <defs>
    <linearGradient id="bg" x1="0.85" y1="0" x2="0.15" y2="1">
      <stop offset="0%" stop-color="#12C5D5"/>
      <stop offset="100%" stop-color="#005062"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <clipPath id="hex">
      <polygon points="195,22 362,118 362,312 195,408 28,312 28,118"/>
    </clipPath>
  </defs>

  <!-- Main hexagon -->
  <polygon
    points="195,22 362,118 362,312 195,408 28,312 28,118"
    fill="url(#bg)"
    filter="url(#shadow)"
  />

  <!-- White inner border -->
  <polygon
    points="195,35 349,124 349,306 195,395 41,306 41,124"
    fill="none"
    stroke="white"
    stroke-width="3.5"
  />

  <!-- Dark banner (clipped to hex shape) -->
  <rect x="0" y="185" width="390" height="95" fill="#006F78" clip-path="url(#hex)"/>

  <!-- ZERO -->
  <text
    x="200" y="166"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="70"
    font-weight="900"
    fill="white"
    text-anchor="middle"
  >ZERO</text>

  <!-- DATA -->
  <text
    x="195" y="255"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="64"
    font-weight="900"
    fill="white"
    text-anchor="middle"
  >DATA</text>

  <!-- RETENTION (x offset by -letter-spacing/2 to correct centering) -->
  <text
    x="191.5" y="322"
    font-family="Arial, Helvetica, sans-serif"
    font-size="27"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="7"
  >RETENTION</text>
</svg>
